<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة أرباح USDT</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1b1b1b;
padding:25px;
border-radius:15px;
width:400px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
text-align:center;
color:#00d1b2;
margin-bottom:20px;
}

label{
font-size:14px;
color:#aaa;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
font-size:16px;
text-align:center;
}

button{
width:48%;
padding:10px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.calc{
background:#00d1b2;
color:black;
}

.reset{
background:#ff4d6d;
color:white;
}

.buttons{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.result{
background:#2a2a2a;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.title{
font-size:13px;
color:#aaa;
}

.value{
font-size:18px;
font-weight:bold;
color:#00d1b2;
}

.signature{
text-align:center;
margin-top:10px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<h2>حاسبة أرباح USDT</h2>

<label>المبلغ بالريال العماني</label>
<input id="amount" type="number" value="100">

<label>سعر الشراء</label>
<input id="buyPrice" type="number" step="0.001" value="0.391">

<label>سعر البيع</label>
<input id="sellPrice" type="number" step="0.001" value="0.393">

<label>عدد الدورات</label>
<input id="cycles" type="number" value="5">

<div class="buttons">
<button class="calc" onclick="calculate()">احسب</button>
<button class="reset" onclick="resetCalc()">Reset</button>
</div>

<div class="result">
<div class="title">كمية USDT</div>
<div id="usdt" class="value">0</div>
</div>

<div class="result">
<div class="title">الربح في الدورة الواحدة</div>
<div id="profitOne" class="value">0</div>
</div>

<div class="result">
<div class="title">الربح بعد كل الدورات</div>
<div id="profitTotal" class="value">0</div>
</div>

<div class="result">
<div class="title">سعر التعادل</div>
<div id="breakEven" class="value">0</div>
</div>

<div class="result">
<div class="title">نسبة الربح</div>
<div id="roi" class="value">0%</div>
</div>

<div class="signature">
تم التصميم بواسطة فارس محمود
</div>

</div>

<script>

function calculate(){

const amount = parseFloat(document.getElementById("amount").value);
const buy = parseFloat(document.getElementById("buyPrice").value);
const sell = parseFloat(document.getElementById("sellPrice").value);
const cycles = parseFloat(document.getElementById("cycles").value);

const fee = 0.08;

let usdt = amount / buy;

let usdtAfterBuyFee = usdt - fee;

let sellValue = usdtAfterBuyFee * sell;

let sellFeeOMR = fee * buy;

let profitOne = sellValue - amount - sellFeeOMR;

let profitTotal = profitOne * cycles;

let breakEven = (amount + sellFeeOMR) / usdtAfterBuyFee;

let roi = (profitOne / amount) * 100;

document.getElementById("usdt").innerText = usdt.toFixed(3) + " USDT";

document.getElementById("profitOne").innerText = profitOne.toFixed(3) + " OMR";

document.getElementById("profitTotal").innerText = profitTotal.toFixed(3) + " OMR";

document.getElementById("breakEven").innerText = breakEven.toFixed(4);

document.getElementById("roi").innerText = roi.toFixed(2) + "%";

}

function resetCalc(){

document.getElementById("amount").value="";
document.getElementById("buyPrice").value="";
document.getElementById("sellPrice").value="";
document.getElementById("cycles").value="";

document.getElementById("usdt").innerText="0";
document.getElementById("profitOne").innerText="0";
document.getElementById("profitTotal").innerText="0";
document.getElementById("breakEven").innerText="0";
document.getElementById("roi").innerText="0%";

}

calculate()

</script>

</body>
</html>
